<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>star.browser — virtual studio</title>
<style>
/* ============================================================
   DESIGN TOKENS
   Base: white / silver / soft gray (50%)
   Point: lavender / pale pink / sky blue (25%)
   Texture: glass / translucent / chrome (15%)
   Cute accents: tiny stars/hearts (10%)
============================================================ */
:root{
  --white:#ffffff;
  --paper:#f6f6f8;
  --silver:#d9dade;
  --silver-2:#c3c5cc;
  --gray:#8a8c95;
  --gray-soft:#aeb0b8;
  --ink:#1b1b1f;
  --ink-soft:#3a3a42;

  --lavender:#cdc4f0;
  --lavender-deep:#a99ee0;
  --pink:#f3cdda;
  --pink-deep:#e9a9c2;
  --sky:#bfe0f2;
  --sky-deep:#8fc6e8;

  --chrome-1:#fbfbfd;
  --chrome-2:#dfe1e7;
  --chrome-3:#b6b9c4;
  --chrome-4:#9a9da9;

  --glass:rgba(255,255,255,0.55);
  --glass-line:rgba(255,255,255,0.7);
  --shadow-soft:0 8px 30px rgba(40,40,60,0.12);
  --shadow-pop:0 18px 50px rgba(60,50,90,0.22);
  --radius:18px;
  --radius-sm:12px;
  --font:'Segoe UI',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font);
  color:var(--ink);
  /* desktop background: soft gradient virtual room */
  background:
    radial-gradient(1200px 600px at 15% 0%, rgba(205,196,240,0.45), transparent 60%),
    radial-gradient(1000px 700px at 100% 20%, rgba(191,224,242,0.4), transparent 55%),
    radial-gradient(900px 600px at 60% 100%, rgba(243,205,218,0.35), transparent 55%),
    linear-gradient(160deg,#eef0f4,#e3e4ea);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:26px;
  overflow-x:hidden;
}

/* soft floating background dots */
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-orbs span{position:absolute;border-radius:50%;filter:blur(2px);opacity:.5;animation:drift 16s ease-in-out infinite;}
.bg-orbs span:nth-child(1){width:90px;height:90px;left:8%;top:18%;background:radial-gradient(circle at 30% 30%,#fff,var(--lavender));animation-delay:0s;}
.bg-orbs span:nth-child(2){width:60px;height:60px;left:82%;top:62%;background:radial-gradient(circle at 30% 30%,#fff,var(--sky));animation-delay:-4s;}
.bg-orbs span:nth-child(3){width:46px;height:46px;left:70%;top:14%;background:radial-gradient(circle at 30% 30%,#fff,var(--pink));animation-delay:-8s;}
@keyframes drift{0%,100%{transform:translateY(0) translateX(0);}50%{transform:translateY(-22px) translateX(10px);}}

/* ============================================================
   BROWSER WINDOW SHELL
============================================================ */
.browser{
  position:relative;z-index:1;
  width:min(1180px,100%);
  height:min(760px,90vh);
  background:linear-gradient(180deg,var(--chrome-1),#eceef3);
  border-radius:22px;
  box-shadow:var(--shadow-pop), inset 0 1px 0 rgba(255,255,255,.9);
  border:1px solid rgba(255,255,255,.6);
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* top chrome bar */
.top-bar{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;
  background:linear-gradient(180deg,#f7f8fb,#e7e9f0);
  border-bottom:1px solid var(--silver);
}
.traffic{display:flex;gap:8px;}
.traffic i{width:13px;height:13px;border-radius:50%;display:block;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);}
.traffic .r{background:linear-gradient(180deg,#ffa3a3,#f1788a);}
.traffic .y{background:linear-gradient(180deg,#ffe2a0,#f4c96b);}
.traffic .g{background:linear-gradient(180deg,#bfeac0,#8fce9a);}
.nav-btns{display:flex;gap:6px;color:var(--gray);}
.nav-btns button{
  border:none;background:rgba(255,255,255,.6);width:28px;height:28px;border-radius:9px;
  color:var(--gray);cursor:pointer;font-size:14px;line-height:1;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.05);transition:.18s;
}
.nav-btns button:hover{background:#fff;color:var(--ink);transform:translateY(-1px);}
.url-bar{
  flex:1;display:flex;align-items:center;gap:8px;
  background:#fff;border-radius:11px;padding:7px 14px;
  box-shadow:inset 0 0 0 1px var(--silver);
  font-size:13px;color:var(--ink-soft);min-width:0;
}
.url-bar .lock{color:var(--lavender-deep);font-size:12px;}
.url-bar .addr{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.url-bar .blink{margin-left:auto;color:var(--gray-soft);font-size:11px;}
.tab-row{display:flex;gap:6px;padding:0 14px;background:#e7e9f0;}
.tab{
  display:flex;align-items:center;gap:7px;
  padding:8px 16px;font-size:12px;color:var(--ink-soft);
  background:linear-gradient(180deg,#fbfbfd,#eef0f5);
  border-radius:11px 11px 0 0;border:1px solid var(--silver);border-bottom:none;
  margin-top:6px;max-width:170px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tab .dot{width:8px;height:8px;border-radius:50%;background:var(--lavender);flex:none;}

/* ============================================================
   BODY: sidebar + stage + character
============================================================ */
.viewport{flex:1;display:flex;min-height:0;background:linear-gradient(170deg,#fbfbfd,#eef0f5);}

/* sidebar bookmarks */
.sidebar{
  width:188px;flex:none;
  padding:18px 14px;
  border-right:1px solid var(--silver);
  background:linear-gradient(180deg,rgba(255,255,255,.7),rgba(244,244,248,.7));
  backdrop-filter:blur(6px);
  display:flex;flex-direction:column;gap:6px;
  overflow:auto;
}
.side-title{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gray);margin:4px 6px 8px;}
.bm{
  display:flex;align-items:center;gap:10px;
  padding:9px 11px;border-radius:11px;cursor:pointer;
  font-size:13px;color:var(--ink-soft);transition:.16s;border:1px solid transparent;
}
.bm:hover{background:#fff;border-color:var(--silver);transform:translateX(2px);}
.bm.active{background:linear-gradient(180deg,#fff,#f1eefc);border-color:var(--lavender);}
.bm .ic{
  width:20px;height:20px;border-radius:6px;flex:none;
  background:linear-gradient(160deg,var(--chrome-2),var(--chrome-3));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
  position:relative;
}
.bm .ic.lav{background:linear-gradient(160deg,#e3dcf8,var(--lavender-deep));}
.bm .ic.pink{background:linear-gradient(160deg,#fbe1ea,var(--pink-deep));}
.bm .ic.sky{background:linear-gradient(160deg,#dcf0fb,var(--sky-deep));}
.side-foot{margin-top:auto;font-size:10px;color:var(--gray-soft);padding:10px 6px 2px;line-height:1.5;}
.status-pill{
  display:inline-flex;align-items:center;gap:6px;font-size:10px;color:var(--lavender-deep);
  background:#f3effd;border:1px solid var(--lavender);border-radius:20px;padding:4px 9px;margin-bottom:6px;
}
.status-pill .live{width:6px;height:6px;border-radius:50%;background:#8fce9a;animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* stage (folder grid + greeting) */
.stage{flex:1;position:relative;display:flex;flex-direction:column;min-width:0;overflow:auto;}
.stage-inner{padding:26px 30px 16px;}
.greeting{margin-bottom:20px;}
.greeting h1{font-size:20px;font-weight:600;letter-spacing:-.01em;color:var(--ink);display:flex;align-items:center;gap:10px;}
.greeting h1 .spark{font-size:14px;color:var(--lavender-deep);}
.greeting p{font-size:13px;color:var(--gray);margin-top:6px;}

.grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:18px;
}

/* FOLDER OBJECT — glass / chrome / lavender variants */
.folder{
  position:relative;cursor:pointer;border:none;background:none;
  padding:0;text-align:left;border-radius:var(--radius);
  transition:transform .2s cubic-bezier(.2,.8,.3,1.2),box-shadow .2s;
  outline:none;
}
.folder:focus-visible{box-shadow:0 0 0 3px var(--lavender-deep);}
.folder:hover{transform:translateY(-7px);}
.folder .body{
  position:relative;height:118px;border-radius:var(--radius);
  background:var(--glass);
  border:1px solid var(--glass-line);
  box-shadow:var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,.85);
  backdrop-filter:blur(8px);
  overflow:hidden;
}
.folder:hover .body{box-shadow:var(--shadow-pop), inset 0 1px 0 rgba(255,255,255,.9);}
/* folder tab */
.folder .body::before{
  content:"";position:absolute;top:-9px;left:16px;width:54px;height:18px;border-radius:8px 8px 0 0;
  background:inherit;border:1px solid var(--glass-line);border-bottom:none;
}
/* glossy sweep */
.folder .body::after{
  content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(125deg,rgba(255,255,255,.55),rgba(255,255,255,0) 40%);
}
.folder.chrome .body{background:linear-gradient(160deg,var(--chrome-1),var(--chrome-2) 70%,var(--chrome-3));}
.folder.lav .body{background:linear-gradient(160deg,#f3effd,#d9cef5);}
.folder.pink .body{background:linear-gradient(160deg,#fdf1f6,#f4cfdd);}
.folder.sky .body{background:linear-gradient(160deg,#eef8fd,#cfe7f6);}
.folder .ico{position:absolute;top:14px;right:14px;font-size:16px;opacity:.7;}
.folder .label{
  position:absolute;left:14px;bottom:12px;right:12px;
}
.folder .label .name{font-size:13px;font-weight:600;color:var(--ink);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.folder .label .meta{font-size:10px;color:var(--gray);margin-top:2px;}
/* tiny mini-icons inside folder */
.folder .chips{position:absolute;top:16px;left:14px;display:flex;gap:5px;}
.folder .chips i{width:10px;height:13px;border-radius:2px;background:rgba(255,255,255,.75);box-shadow:0 1px 3px rgba(0,0,0,.12);display:block;}
.folder .chips i:nth-child(2){transform:translateY(2px);background:rgba(255,255,255,.55);}
.folder .chips i:nth-child(3){transform:translateY(4px);background:rgba(255,255,255,.4);}

/* ============================================================
   BOTTOM DESCRIPTION PANEL
============================================================ */
.desc-panel{
  margin-top:auto;
  padding:14px 30px;
  border-top:1px solid var(--silver);
  background:linear-gradient(180deg,rgba(255,255,255,.6),rgba(244,244,248,.85));
  backdrop-filter:blur(6px);
  display:flex;align-items:center;gap:16px;min-height:64px;
}
.desc-panel .tag{
  font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--lavender-deep);
  border:1px solid var(--lavender);border-radius:20px;padding:5px 11px;flex:none;
}
.desc-panel .txt{font-size:13px;color:var(--ink-soft);line-height:1.5;}
.desc-panel .txt strong{color:var(--ink);font-weight:600;}

/* ============================================================
   CHARACTER / AVATAR AREA
============================================================ */
.avatar-dock{
  position:absolute;right:22px;bottom:90px;z-index:6;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  pointer-events:none;
}
.speech{
  pointer-events:auto;
  max-width:210px;background:#fff;border:1px solid var(--silver);
  border-radius:16px;padding:10px 14px;font-size:12px;color:var(--ink-soft);line-height:1.45;
  box-shadow:var(--shadow-soft);position:relative;
  animation:popIn .35s ease;
}
.speech::after{content:"";position:absolute;bottom:-7px;right:30px;width:14px;height:14px;background:#fff;border-right:1px solid var(--silver);border-bottom:1px solid var(--silver);transform:rotate(45deg);}
@keyframes popIn{from{opacity:0;transform:translateY(6px) scale(.96);}to{opacity:1;transform:none;}}
.avatar-preview{
  pointer-events:auto;
  width:150px;height:184px;border-radius:22px;position:relative;
  background:
    radial-gradient(120px 80px at 50% 18%, rgba(205,196,240,.5), transparent 70%),
    linear-gradient(180deg,#ffffff,#eef0f6);
  border:1px solid var(--glass-line);
  box-shadow:var(--shadow-pop), inset 0 1px 0 rgba(255,255,255,.9);
  overflow:hidden;
  animation:float 5s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
.avatar-preview img{width:100%;height:100%;object-fit:cover;display:block;}
/* placeholder figure (CSS) shown until real image loads */
.avatar-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;}
.ph-hair{position:absolute;top:30px;width:78px;height:120px;background:linear-gradient(180deg,#2a2a30,#16161a);border-radius:42px 42px 30px 30px;}
.ph-face{position:absolute;top:46px;width:54px;height:60px;background:linear-gradient(180deg,#fbeee6,#f3ddd0);border-radius:28px 28px 30px 30px;}
.ph-eye{position:absolute;top:70px;width:7px;height:9px;border-radius:50%;background:#2a2a30;}
.ph-eye.l{left:58px;}.ph-eye.r{right:58px;}
.ph-blush{position:absolute;top:80px;width:10px;height:5px;border-radius:50%;background:var(--pink-deep);opacity:.6;}
.ph-blush.l{left:50px;}.ph-blush.r{right:50px;}
.ph-body{position:absolute;bottom:0;width:96px;height:70px;background:linear-gradient(180deg,#f4efe6,#e6dccb);border-radius:30px 30px 0 0;}
.ph-device{position:absolute;bottom:22px;right:24px;width:26px;height:34px;border-radius:5px;background:linear-gradient(160deg,rgba(255,255,255,.9),rgba(191,224,242,.7));border:1px solid rgba(255,255,255,.9);box-shadow:0 2px 6px rgba(0,0,0,.12);transform:rotate(-12deg);}
.avatar-tag{pointer-events:auto;font-size:10px;color:var(--gray);background:rgba(255,255,255,.7);border:1px solid var(--silver);border-radius:20px;padding:3px 10px;}
.avatar-tag b{color:var(--lavender-deep);}

/* ============================================================
   POPUP RETRO WINDOWS (folder open)
============================================================ */
.win-layer{position:absolute;inset:0;z-index:20;pointer-events:none;}
.scrim{position:absolute;inset:0;background:rgba(40,40,60,.18);opacity:0;transition:.25s;pointer-events:none;backdrop-filter:blur(1px);}
.scrim.show{opacity:1;pointer-events:auto;}
.win{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-46%) scale(.94);
  width:min(640px,86%);max-height:78%;
  background:linear-gradient(180deg,var(--chrome-1),#eef0f5);
  border-radius:18px;border:1px solid var(--glass-line);
  box-shadow:var(--shadow-pop);
  opacity:0;pointer-events:none;transition:.26s cubic-bezier(.2,.8,.3,1.1);
  display:flex;flex-direction:column;overflow:hidden;
}
.win.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1);}
.win.min{transform:translate(-50%,140%) scale(.9);opacity:0;pointer-events:none;}
.win.max{width:94%;max-height:90%;}
.win-bar{
  display:flex;align-items:center;gap:10px;padding:11px 14px;
  background:linear-gradient(180deg,#f7f8fb,#e7e9f0);border-bottom:1px solid var(--silver);
  cursor:default;
}
.win-bar .dots{display:flex;gap:7px;}
.win-bar .dots b{width:12px;height:12px;border-radius:50%;display:block;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);}
.win-bar .dots .c{background:linear-gradient(180deg,#ffa3a3,#f1788a);}
.win-bar .dots .m{background:linear-gradient(180deg,#ffe2a0,#f4c96b);}
.win-bar .dots .x{background:linear-gradient(180deg,#bfeac0,#8fce9a);}
.win-bar .wt{font-size:12px;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:7px;}
.win-bar .wt .fav{width:14px;height:14px;border-radius:4px;background:linear-gradient(160deg,#e3dcf8,var(--lavender-deep));}
.win-body{padding:20px;overflow:auto;}
.win-intro{font-size:12px;color:var(--gray);margin-bottom:16px;line-height:1.5;}

/* project cards grid */
.proj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}

/* base card */
.card{
  position:relative;cursor:pointer;border:none;text-align:left;
  border-radius:14px;padding:0;overflow:hidden;
  background:#fff;border:1px solid var(--silver);
  box-shadow:var(--shadow-soft);transition:.18s;outline:none;
}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-pop);}
.card:focus-visible{box-shadow:0 0 0 3px var(--lavender-deep);}
.card .thumb{height:96px;position:relative;overflow:hidden;}
.card .thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(125deg,rgba(255,255,255,.5),transparent 45%);}
.card .info{padding:11px 13px 13px;}
.card .info .t{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card .info .s{font-size:11px;color:var(--gray);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card .badge{position:absolute;top:9px;left:9px;font-size:9px;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.85);color:var(--ink-soft);border-radius:20px;padding:3px 8px;z-index:2;}

/* card variant: CD case */
.thumb.cd{background:linear-gradient(135deg,#e9e3fb,#c9d8f2);}
.thumb.cd .disc{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:74px;height:74px;border-radius:50%;
  background:conic-gradient(from 0deg,#f6c9de,#c4d6f5,#d8cdf3,#bfe6f0,#f6c9de);box-shadow:0 4px 12px rgba(0,0,0,.18);}
.thumb.cd .disc::after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:inset 0 0 0 6px rgba(0,0,0,.08);}
/* card variant: cassette */
.thumb.tape{background:linear-gradient(135deg,#fbe1ea,#e8d8f6);}
.thumb.tape .deck{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:104px;height:58px;border-radius:8px;background:linear-gradient(180deg,#fff,#eee);box-shadow:0 4px 10px rgba(0,0,0,.15);}
.thumb.tape .deck::before{content:"";position:absolute;left:14px;top:18px;width:18px;height:18px;border-radius:50%;background:#cdc4f0;box-shadow:54px 0 0 #cdc4f0;}
.thumb.tape .deck::after{content:"";position:absolute;left:12px;top:8px;right:12px;height:5px;border-radius:3px;background:#bbb;}
/* card variant: chrome shopping bag */
.thumb.bag{background:linear-gradient(135deg,#dfe2ea,#c3c6d2);}
.thumb.bag .b{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);width:60px;height:62px;border-radius:4px 4px 8px 8px;background:linear-gradient(160deg,#fbfbfd,#c9ccd6);box-shadow:0 5px 12px rgba(0,0,0,.18);}
.thumb.bag .b::before{content:"";position:absolute;top:-14px;left:12px;right:12px;height:20px;border:3px solid #b6b9c4;border-bottom:none;border-radius:20px 20px 0 0;}
/* card variant: browser tab */
.thumb.tab2{background:linear-gradient(135deg,#dcf0fb,#cfe0f5);}
.thumb.tab2 .win-mini{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);width:108px;height:64px;border-radius:8px;background:#fff;box-shadow:0 5px 12px rgba(0,0,0,.15);overflow:hidden;}
.thumb.tab2 .win-mini::before{content:"";position:absolute;top:0;left:0;right:0;height:14px;background:#e7e9f0;}
.thumb.tab2 .win-mini::after{content:"";position:absolute;top:22px;left:10px;width:30px;height:30px;border-radius:6px;background:#bfe0f2;box-shadow:40px 0 0 #cdc4f0,0 38px 0 #f3cdda;}
/* card variant: cosmetic case */
.thumb.cos{background:linear-gradient(135deg,#fdeef4,#e7e0f8);}
.thumb.cos .bottle{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);width:36px;height:58px;border-radius:10px;background:linear-gradient(160deg,rgba(255,255,255,.85),rgba(243,205,218,.7));border:1px solid #fff;box-shadow:0 5px 12px rgba(0,0,0,.12);}
.thumb.cos .bottle::before{content:"";position:absolute;top:-10px;left:11px;width:14px;height:12px;background:#cdc4f0;border-radius:3px;}
/* card variant: game cartridge / pixel */
.thumb.game{background:linear-gradient(135deg,#e3dcf8,#cfeae0);}
.thumb.game .cart{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);width:58px;height:64px;border-radius:6px 6px 4px 4px;background:linear-gradient(160deg,#fff,#cdc4f0);box-shadow:0 5px 12px rgba(0,0,0,.15);}
.thumb.game .cart::before{content:"";position:absolute;top:10px;left:12px;right:12px;height:22px;background:#8a8c95;border-radius:3px;}
.thumb.game .cart::after{content:"";position:absolute;bottom:8px;left:16px;right:16px;height:6px;background:#f3cdda;border-radius:3px;}
/* generic folder-doc thumb */
.thumb.doc{background:linear-gradient(135deg,#eef0f5,#dadde6);}
.thumb.doc .pg{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);width:54px;height:66px;background:#fff;border-radius:5px;box-shadow:0 5px 12px rgba(0,0,0,.14);}
.thumb.doc .pg::before{content:"";position:absolute;top:12px;left:10px;right:10px;height:4px;background:#cdc4f0;border-radius:3px;box-shadow:0 10px 0 #d9dade,0 20px 0 #d9dade;}

/* DETAIL PANEL (inside window, slides over) */
.detail{
  position:absolute;inset:0;background:linear-gradient(180deg,#fff,#f4f4f8);
  transform:translateX(102%);transition:.3s cubic-bezier(.2,.8,.3,1.1);
  display:flex;flex-direction:column;z-index:5;
}
.detail.show{transform:translateX(0);}
.detail-bar{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--silver);background:linear-gradient(180deg,#f7f8fb,#e7e9f0);}
.detail-bar button{border:none;background:rgba(255,255,255,.7);border-radius:9px;padding:6px 12px;font-size:12px;color:var(--ink-soft);cursor:pointer;box-shadow:inset 0 0 0 1px var(--silver);}
.detail-bar button:hover{background:#fff;}
.detail-body{padding:22px;overflow:auto;}
.detail-hero{height:150px;border-radius:14px;margin-bottom:18px;position:relative;overflow:hidden;}
.detail-body h3{font-size:18px;color:var(--ink);margin-bottom:4px;}
.detail-body .sub{font-size:12px;color:var(--lavender-deep);margin-bottom:16px;}
.detail-body p{font-size:13px;color:var(--ink-soft);line-height:1.65;margin-bottom:14px;}
.meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.meta-row span{font-size:11px;background:#f1eefc;border:1px solid var(--lavender);color:var(--lavender-deep);border-radius:20px;padding:5px 11px;}

/* contact form inside window */
.contact-box{display:flex;flex-direction:column;gap:12px;}
.contact-box .field{display:flex;flex-direction:column;gap:5px;}
.contact-box label{font-size:11px;color:var(--gray);}
.contact-box input,.contact-box textarea{
  border:1px solid var(--silver);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:var(--ink);background:#fff;outline:none;
}
.contact-box input:focus,.contact-box textarea:focus{border-color:var(--lavender-deep);box-shadow:0 0 0 3px rgba(169,158,224,.25);}
.contact-box .send{align-self:flex-start;background:linear-gradient(180deg,#cdc4f0,#a99ee0);color:#fff;border:none;border-radius:11px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:var(--shadow-soft);}
.contact-box .send:hover{filter:brightness(1.04);transform:translateY(-1px);}
.contact-links{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;}
.contact-links a{font-size:12px;color:var(--ink-soft);text-decoration:none;background:#fff;border:1px solid var(--silver);border-radius:20px;padding:7px 14px;transition:.16s;}
.contact-links a:hover{border-color:var(--lavender);background:#f7f5fd;}

/* about content */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.about-card{background:#fff;border:1px solid var(--silver);border-radius:12px;padding:14px;}
.about-card h4{font-size:12px;color:var(--lavender-deep);margin-bottom:8px;letter-spacing:.04em;}
.about-card p{font-size:12px;color:var(--ink-soft);line-height:1.6;}
.about-card .chips2{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.about-card .chips2 span{font-size:10px;background:#f4f4f8;border-radius:14px;padding:4px 9px;color:var(--gray);}

/* ============================================================
   LOADING OVERLAY
============================================================ */
.loader{
  position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  background:linear-gradient(170deg,#fbfbfd,#eef0f5);transition:.5s;
}
.loader.hide{opacity:0;pointer-events:none;}
.loader .mini-ava{width:96px;height:118px;border-radius:18px;position:relative;background:radial-gradient(80px 50px at 50% 20%,rgba(205,196,240,.5),transparent 70%),linear-gradient(180deg,#fff,#eef0f6);border:1px solid var(--glass-line);box-shadow:var(--shadow-soft);overflow:hidden;}
.loader .bar{width:170px;height:6px;border-radius:6px;background:#e3e4ea;overflow:hidden;}
.loader .bar i{display:block;height:100%;width:30%;border-radius:6px;background:linear-gradient(90deg,var(--lavender),var(--sky));animation:load 1.4s ease-in-out infinite;}
@keyframes load{0%{margin-left:-30%;}100%{margin-left:100%;}}
.loader .lt{font-size:12px;color:var(--gray);}

/* ============================================================
   RESPONSIVE
============================================================ */
@media(max-width:900px){
  body{padding:0;}
  .browser{height:100vh;width:100%;border-radius:0;}
  .grid{grid-template-columns:repeat(2,1fr);}
  .sidebar{width:150px;}
  .avatar-dock{bottom:84px;right:14px;}
  .avatar-preview{width:120px;height:150px;}
  .speech{max-width:170px;}
  .proj-grid{grid-template-columns:1fr;}
  .about-grid{grid-template-columns:1fr;}
}
@media(max-width:620px){
  .tab-row{display:none;}
  .viewport{flex-direction:column;}
  .sidebar{
    width:100%;flex-direction:row;flex-wrap:nowrap;overflow-x:auto;gap:8px;
    border-right:none;border-bottom:1px solid var(--silver);padding:10px 12px;
  }
  .side-title,.side-foot,.status-pill{display:none;}
  .bm{flex:none;white-space:nowrap;padding:8px 10px;}
  .bm .name-t{display:none;}
  .grid{grid-template-columns:1fr 1fr;gap:12px;}
  .stage-inner{padding:18px 16px 10px;}
  .greeting h1{font-size:17px;}
  .desc-panel{padding:12px 16px;flex-direction:column;align-items:flex-start;gap:8px;}
  /* mobile: avatar small + fixed bottom */
  .avatar-dock{position:fixed;bottom:14px;right:12px;align-items:flex-end;}
  .avatar-preview{width:78px;height:96px;animation:none;}
  .speech{max-width:150px;font-size:11px;padding:8px 11px;}
  .avatar-tag{display:none;}
  .win{width:94%;max-height:82%;}
  .url-bar .blink{display:none;}
}
@media(max-width:400px){
  .grid{grid-template-columns:1fr;}
}

<body>

<div class="bg-orbs"><span></span><span></span><span></span></div>

</main>

<script>
/* ============================================================
   DATA
============================================================ */
const FOLDERS = {
  about:{ name:"About.folder", cls:"lav", icon:"✦", meta:"who / mood",

    speech:"쇼핑이 즐거워지는 화면을 좋아해요." },
  branding:{ name:"Branding.folder", cls:"chrome", icon:"◆", meta:"identity",
    desc:"무드와 톤을 잡은 <strong>브랜딩</strong> 작업이에요.",
    speech:"브랜드의 공기를 만드는 일이 좋아요." },
  photo:{ name:"PhotoVideo.folder", cls:"sky", icon:"❍", meta:"visual",
    desc:"빛과 장면을 기록한 <strong>사진·영상</strong>이에요.",
    speech:"순간을 오래 보고 싶어서 찍어둬요." },
  archive:{ name:"Archive.folder", cls:"chrome", icon:"⌘", meta:"keepsake",
    desc:"<strong>기록과 취향</strong>은 여기 보관해뒀어요.",
    speech:"기록과 취향은 여기 보관해뒀어요." },
  contact:{ name:"Contact.folder", cls:"pink", icon:"✉", meta:"say hi",
    desc:"함께 일하고 싶다면 <strong>여기로 인사</strong>해주세요.",
    speech:"메시지를 남겨주시면 천천히, 정확히 답할게요." }
};

const PROJECTS = {
  about:[],
  works:[
    {t:"My Star Calendar",s:"감성 캘린더 앱",badge:"app",thumb:"cd",
     tags:["iOS","Product","2024"],
     body:"하루의 기분과 일정을 별처럼 모아두는 캘린더 앱. 차분한 색과 절제된 모션으로 매일 열고 싶은 인터페이스를 설계했어요."},
    {t:"SMTOWN Store Redesign",s:"커머스 리디자인",badge:"shop",thumb:"bag",
     tags:["E-commerce","UI","Redesign"],
     body:"팬을 위한 굿즈 스토어를 크롬·실버 톤으로 재해석. 탐색과 결제의 마찰을 줄이고 브랜드의 무드를 화면 전체로 확장했어요."},
    {t:"Naver Redesign",s:"포털 UI 실험",badge:"web",thumb:"tab2",
     tags:["UX","Concept","Web"],
     body:"익숙한 포털을 더 가볍고 개인적인 브라우저 경험으로 재구성한 컨셉 작업."},
  ],
  uiux:[
    {t:"My Star Calendar",s:"플로우 설계",badge:"flow",thumb:"cd",
     tags:["IA","Prototype"],
     body:"온보딩부터 기록까지의 흐름을 도식화하고, 손이 머무는 지점을 줄였어요."},
    {t:"Naver Redesign",s:"브라우저 탭형 UI",badge:"ui",thumb:"tab2",
     tags:["Web","Interaction"],
     body:"탭과 카드 중심으로 정보를 다시 묶어 가벼운 탐색 경험을 만들었어요."},
  ],
  ecommerce:[
    {t:"SMTOWN Store Redesign",s:"쇼핑백 카드형",badge:"shop",thumb:"bag",
     tags:["Commerce","Brand"],
     body:"장바구니까지의 동선을 단순화하고, 굿즈가 주인공이 되도록 화면을 비웠어요."},
    {t:"Cosmetic AI Site",s:"반투명 케이스 무드",badge:"ai",thumb:"cos",
     tags:["AI","Beauty","Web"],
     body:"피부 톤 추천을 돕는 AI 코스메틱 사이트. 투명 플라스틱 질감으로 청결하고 가벼운 인상을 줬어요."},
  ],
  branding:[
    {t:"Cosmetic AI Site",s:"비주얼 아이덴티티",badge:"identity",thumb:"cos",
     tags:["Brand","Visual"],
     body:"라벤더와 실버를 축으로 한 톤·로고·패키지 무드를 정리했어요."},
    {t:"My Star Calendar",s:"앱 아이덴티티",badge:"identity",thumb:"cd",
     tags:["Logo","Motion"],
     body:"별과 캘린더를 잇는 심볼과 부드러운 모션 언어를 만들었어요."},
  ],
  photo:[
    {t:"Quiet Frames",s:"정물·빛 기록",badge:"photo",thumb:"doc",
     tags:["Photo","Series"],
     body:"오후의 빛과 사물을 차분히 담은 개인 사진 시리즈."},
    {t:"Loop Tape",s:"무드 영상",badge:"video",thumb:"tape",
     tags:["Video","Edit"],
     body:"카세트처럼 반복해 보고 싶은 짧은 무드 영상 모음."},
  ],
  archive:[
    {t:"Nintendo / Game Site",s:"게임팩 카드",badge:"play",thumb:"game",
     tags:["Fun","Pixel"],
     body:"좋아하는 게임의 무드를 픽셀·카트리지로 재현한 개인 아카이브."},
    {t:"Mixtape Notes",s:"취향 기록",badge:"note",thumb:"tape",
     tags:["Music","Diary"],
     body:"플레이리스트와 메모를 카세트 카드로 모아둔 취향 노트."},
    {t:"Moodboard",s:"레퍼런스",badge:"ref",thumb:"doc",
     tags:["Reference"],
     body:"레트로 디지털·투명 플라스틱·크롬 무드의 레퍼런스 보관함."},
  ],
  contact:[]
};

/* ============================================================
   BUILD FOLDER GRID
============================================================ */
const grid = document.getElementById('grid');
Object.entries(FOLDERS).forEach(([key,f])=>{
  const b=document.createElement('button');
  b.className='folder '+f.cls;
  b.setAttribute('aria-label', f.name+' 열기');
  b.dataset.folder=key;
  b.innerHTML=`
    <div class="body">
      <div class="chips"><i></i><i></i><i></i></div>
      <div class="ico" aria-hidden="true">${f.icon}</div>
      <div class="label"><span class="name">${f.name}</span><span class="meta">${f.meta}</span></div>
    </div>`;
  b.addEventListener('mouseenter',()=>setDesc(key));
  b.addEventListener('focus',()=>setDesc(key));
  b.addEventListener('click',()=>openFolder(key));
  grid.appendChild(b);
});

/* ============================================================
   DESCRIPTION PANEL + SPEECH + AVATAR STATE
============================================================ */
const descTag=document.getElementById('descTag');
const descTxt=document.getElementById('descTxt');
const speech=document.getElementById('speech');
const avatarState=document.getElementById('avatarState');
const avatarImg=document.getElementById('avatarImg');

function setDesc(key){
  const f=FOLDERS[key];
  descTag.textContent=f.meta;
  descTxt.innerHTML=f.desc;
}
function setSpeech(text){
  speech.style.animation='none';
  void speech.offsetWidth; // reflow to restart animation
  speech.style.animation='';
  speech.textContent=text;
}
function setAvatar(state){
  avatarState.textContent=state;
  // swap image source; placeholder stays if file missing
  if(avatarImg.style.display!=='none'){
    avatarImg.src='assets/avatar-'+state+'.webp';
  }
}

/* ============================================================
   WINDOW OPEN / CLOSE / MIN / MAX
============================================================ */
const scrim=document.getElementById('scrim');
const win=document.getElementById('win');
const winTitle=document.getElementById('winTitle');
const winBody=document.getElementById('winBody');
const detail=document.getElementById('detail');
const detailBody=document.getElementById('detailBody');

function openFolder(key){
  const f=FOLDERS[key];
  // active bookmark sync
  document.querySelectorAll('.bm').forEach(b=>b.classList.toggle('active',b.dataset.folder===key));
  setDesc(key);
  setSpeech(f.speech);
  setAvatar('guide');

  winTitle.textContent=f.name;
  detail.classList.remove('show');
  winBody.innerHTML=renderBody(key);
  // bind cards
  winBody.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click',()=>openDetail(key,parseInt(c.dataset.i)));
  });
  // contact form bind
  const form=winBody.querySelector('#contactForm');
  if(form) form.addEventListener('submit',e=>{e.preventDefault();setSpeech("메시지 고마워요. 천천히, 정확히 답할게요.");e.target.reset();});

  scrim.classList.add('show');
  win.classList.remove('min','max');
  win.classList.add('open');
}

function renderBody(key){
  if(key==='about') return aboutHTML();
  if(key==='contact') return contactHTML();
  const list=PROJECTS[key]||[];
  const cards=list.map((p,i)=>`
    <button class="card" data-i="${i}" aria-label="${p.t} 상세 보기">
      <div class="thumb ${p.thumb}">
        <span class="badge">${p.badge}</span>
        ${thumbInner(p.thumb)}
      </div>
      <div class="info"><span class="t">${p.t}</span><span class="s">${p.s}</span></div>
    </button>`).join('');
  return `<p class="win-intro">${FOLDERS[key].desc} 카드를 누르면 자세히 볼 수 있어요.</p>
          <div class="proj-grid">${cards}</div>`;
}
function thumbInner(type){
  const map={cd:'<div class="disc"></div>',tape:'<div class="deck"></div>',bag:'<div class="b"></div>',
    tab2:'<div class="win-mini"></div>',cos:'<div class="bottle"></div>',game:'<div class="cart"></div>',doc:'<div class="pg"></div>'};
  return map[type]||'';
}

/* DETAIL PANEL */
function openDetail(key,i){
  const p=PROJECTS[key][i];
  setSpeech(`"${p.t}" — ${p.s} 이야기를 들려드릴게요.`);
  detailBody.innerHTML=`
    <div class="detail-hero thumb ${p.thumb}" style="height:150px">${thumbInner(p.thumb)}</div>
    <h3>${p.t}</h3>
    <div class="sub">${p.s}</div>
    <div class="meta-row">${p.tags.map(t=>`<span>${t}</span>`).join('')}</div>
    <p>${p.body}</p>
    <p style="color:var(--gray);font-size:12px">실제 이미지·상세 케이스 스터디는 이 영역에 이어 붙일 수 있어요.</p>`;
  detail.classList.add('show');
}
document.getElementById('detailBack').addEventListener('click',()=>{detail.classList.remove('show');setAvatar('guide');});

/* window controls */
function closeWin(){
  win.classList.remove('open','max');
  scrim.classList.remove('show');
  setAvatar('idle');
  setSpeech("또 다른 폴더도 열어볼까요?");
  document.querySelectorAll('.bm').forEach(b=>b.classList.remove('active'));
}
document.getElementById('winClose').addEventListener('click',closeWin);
document.getElementById('winMin').addEventListener('click',()=>{win.classList.add('min');win.classList.remove('open');setTimeout(()=>{scrim.classList.remove('show');},220);setAvatar('idle');});
document.getElementById('winMax').addEventListener('click',()=>win.classList.toggle('max'));
document.getElementById('winClose').addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')closeWin();});
scrim.addEventListener('click',closeWin);
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&win.classList.contains('open'))closeWin();});

/* sidebar bookmarks → open folder */
document.querySelectorAll('.bm').forEach(b=>{
  b.addEventListener('mouseenter',()=>setDesc(b.dataset.folder));
  b.addEventListener('click',()=>openFolder(b.dataset.folder));
});

/* ============================================================
   LOADER (avatar 'loading' state)
============================================================ */
const loader=document.getElementById('loader');
setAvatar('loading');
window.addEventListener('load',()=>{
  setTimeout(()=>{loader.classList.add('hide');setAvatar('idle');},900);
});
</script>
